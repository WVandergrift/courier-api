# Courier nginx site — HTTPS terminating reverse proxy in front of the app
# (uvicorn on 127.0.0.1:8000). This is the FULL config including the :443
# server block, so a redeploy (`cp deploy/nginx.conf` in DEPLOYMENT.md) PRESERVES
# HTTPS instead of reverting to HTTP-only. The daemon posts to
# https://courier.systems/v1/push/ios, so :443 must stay up.
#
# The TLS lines mirror what `certbot --nginx` produces and reference certs at
# /etc/letsencrypt/live/courier.systems/. BOOTSTRAP: on a fresh host these
# don't exist yet — run the certbot step in DEPLOYMENT.md first (it issues the
# cert and can regenerate this block), then deploys are idempotent. Renewals
# only swap the cert files at the same paths, so they don't conflict with this.

# WebSocket upgrade: the companion relay tunnel (/v1/relay/agent) is a
# long-lived WebSocket. This map lets `location /` pass Connection: upgrade only
# for WS requests and close otherwise. A `map` is only valid in the http{}
# context — this site file is included within http{}, so top-level here is fine.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Public, read-only release artifacts. Source and build records stay in private
# GitHub repositories; controllers and shipped apps receive no GitHub token.
server {
    server_name firmware.courier.systems;
    root /var/www/courier-firmware;
    autoindex off;
    default_type application/octet-stream;

    location = /ember-core/releases.json {
        try_files $uri =404;
        default_type application/json;
        add_header Cache-Control "no-store" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header X-Content-Type-Options "nosniff" always;
        limit_except GET HEAD { deny all; }
    }

    location = /ember-core/hardware-profiles/v1/catalog.json {
        try_files $uri =404;
        default_type application/json;
        add_header Cache-Control "no-store" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header X-Content-Type-Options "nosniff" always;
        limit_except GET HEAD { deny all; }
    }

    location = /ember-core/hardware-profiles/v1/schema.json {
        try_files $uri =404;
        default_type application/schema+json;
        add_header Cache-Control "public, max-age=3600" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header X-Content-Type-Options "nosniff" always;
        limit_except GET HEAD { deny all; }
    }

    location ~ ^/ember-core/hardware-profiles/v1/profiles/[a-z0-9.-]+/[a-z0-9.-]+\.webp$ {
        try_files $uri =404;
        default_type image/webp;
        add_header Cache-Control "public, max-age=3600" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header X-Content-Type-Options "nosniff" always;
        limit_except GET HEAD { deny all; }
    }

    location = /ember-core/desktop/latest.json {
        try_files $uri =404;
        default_type application/json;
        add_header Cache-Control "no-store" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header X-Content-Type-Options "nosniff" always;
        limit_except GET HEAD { deny all; }
    }

    location ~ ^/ember-core/releases/v[0-9]+\.[0-9]+\.[0-9]+/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header X-Content-Type-Options "nosniff" always;
        limit_except GET HEAD { deny all; }
    }

    location / { return 404; }

    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/courier.systems/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/courier.systems/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    server_name courier.systems www.courier.systems _;

    client_max_body_size 1m;

    # Static slide deck — isolated from the Courier app. Files live in
    # /var/www/courier-deck (OUTSIDE /opt/courier) so the redeploy rsync
    # --delete can never remove them. Additive: does not affect the proxy below.
    location = /deck { return 301 /deck/; }
    location /deck/ {
        alias /var/www/courier-deck/;
        index index.html;
    }

    # Static Ember Mapper page — same isolation pattern as /deck/: lives in
    # /var/www (outside /opt/courier) so redeploy rsync --delete can't touch it.
    location = /ember-mapper { return 301 /ember-mapper/; }
    location /ember-mapper/ {
        alias /var/www/ember-mapper/;
        index index.html;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket upgrade for the relay tunnel (harmless for plain HTTP —
        # $connection_upgrade is "close" when there's no Upgrade header).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        # The relay tunnel is long-lived; don't let nginx drop it as idle (the
        # daemon also pings every 30s, but keep a generous ceiling).
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/courier.systems/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/courier.systems/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = firmware.courier.systems) {
        return 301 https://$host$request_uri;
    }

    if ($host = www.courier.systems) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = courier.systems) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80 default_server;
    listen [::]:80 default_server;
    server_name courier.systems www.courier.systems firmware.courier.systems _;
    return 404; # managed by Certbot
}
